<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Chat</title>

<!-- ====================================================================
     FIREBASE SETUP — READ ME (Realtime Database version)
     1. Go to https://console.firebase.google.com → select your project
     2. Click the gear icon → Project settings → scroll to "Your apps"
     3. If you don't have a Web app yet, click the </> icon to create one
     4. Copy the firebaseConfig object and paste it below, replacing
        the placeholder values. Make sure "databaseURL" matches your
        Realtime Database URL (the one ending in
        .firebasedatabase.app).
     5. In the Firebase console, go to Build → Realtime Database →
        click "Create database" if you haven't already (start in
        test mode, or use the security rules note in the README).
     6. This writes chat messages under a "chatMessages" node so it
        won't collide with other data already in this same database.
     ==================================================================== -->

<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e2230;
    --border: #2a2f3d;
    --text: #e8eaf0;
    --text-dim: #8a8fa3;
    --accent: #5b8cff;
    --accent-dim: #3a4a7a;
    --me-bubble: #2d4a8a;
    --other-bubble: #1f2330;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 720px;
    margin: 0 auto;
  }

  /* ---------- Name gate ---------- */
  #name-gate {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  #name-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  #name-card h1 {
    font-size: 20px;
    margin: 0 0 6px;
  }

  #name-card p {
    color: var(--text-dim);
    font-size: 14px;
    margin: 0 0 20px;
  }

  #name-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
  }

  #name-input:focus {
    border-color: var(--accent);
  }

  #join-btn {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  #join-btn:disabled {
    background: var(--accent-dim);
    cursor: not-allowed;
  }

  #name-error {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 10px;
    min-height: 16px;
  }

  /* ---------- Chat screen ---------- */
  #chat-screen {
    display: none;
    flex-direction: column;
    height: 100%;
  }

  #chat-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
  }

  #chat-header .title {
    font-weight: 600;
    font-size: 15px;
  }

  #chat-header .sub {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 2px;
  }

  #leave-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }

  #leave-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 78%;
  }

  .msg-row.me {
    align-self: flex-end;
    align-items: flex-end;
  }

  .msg-row.other {
    align-self: flex-start;
    align-items: flex-start;
  }

  .msg-name {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 3px;
    padding: 0 4px;
  }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.4;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .msg-row.me .msg-bubble {
    background: var(--me-bubble);
    border-bottom-right-radius: 4px;
  }

  .msg-row.other .msg-bubble {
    background: var(--other-bubble);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 10.5px;
    color: var(--text-dim);
    margin-top: 3px;
    padding: 0 4px;
  }

  #empty-state {
    color: var(--text-dim);
    text-align: center;
    margin-top: 40px;
    font-size: 14px;
  }

  #input-bar {
    display: flex;
    gap: 10px;
    padding: 14px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }

  #msg-input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 22px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    font-size: 15px;
    outline: none;
  }

  #msg-input:focus {
    border-color: var(--accent);
  }

  #send-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #send-btn:disabled {
    background: var(--accent-dim);
    cursor: not-allowed;
  }

  #connection-banner {
    display: none;
    text-align: center;
    font-size: 12px;
    padding: 6px;
    background: #4a2a2a;
    color: #ffb3b3;
  }

  /* scrollbar */
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="app">

  <!-- ============ NAME GATE ============ -->
  <div id="name-gate">
    <div id="name-card">
      <h1>Join the chat</h1>
      <p>Pick a name to start chatting</p>
      <input id="name-input" type="text" placeholder="Your name" maxlength="24" autocomplete="off" />
      <button id="join-btn">Join chat</button>
      <div id="name-error"></div>
    </div>
  </div>

  <!-- ============ CHAT SCREEN ============ -->
  <div id="chat-screen">
    <div id="connection-banner">Reconnecting…</div>
    <div id="chat-header">
      <div>
        <div class="title">Live Chat</div>
        <div class="sub" id="header-sub">Chatting as …</div>
      </div>
      <button id="leave-btn">Leave</button>
    </div>

    <div id="messages">
      <div id="empty-state">No messages yet. Say hello 👋</div>
    </div>

    <div id="input-bar">
      <input id="msg-input" type="text" placeholder="Type a message…" maxlength="1000" autocomplete="off" />
      <button id="send-btn">➤</button>
    </div>
  </div>

</div>

<!-- ==================== FIREBASE SDK ==================== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase,
    ref,
    push,
    query,
    orderByChild,
    limitToLast,
    onValue,
    serverTimestamp,
    off
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // ============================================================
  // 1) PASTE YOUR FIREBASE CONFIG HERE
  // ============================================================
  const firebaseConfig = {
    apiKey: "AIzaSyCMTeAom5PZgoblFEdSRqh-aaIQfpCD-pE",
    authDomain: "goal-system-50030.firebaseapp.com",
    databaseURL: "https://goal-system-50030-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "goal-system-50030",
    storageBucket: "goal-system-50030.firebasestorage.app",
    messagingSenderId: "499532940345",
    appId: "1:499532940345:web:1d2948d866775ab32e39e8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  // Stored under "chatMessages" so it won't collide with other data
  // already living in this same Realtime Database.
  const chatRef = ref(db, "chatMessages");

  // ============================================================
  // 2) App state
  // ============================================================
  let myName = "";
  let myClientId = localStorage.getItem("chat_client_id");
  if (!myClientId) {
    myClientId = "c_" + Math.random().toString(36).slice(2) + Date.now();
    localStorage.setItem("chat_client_id", myClientId);
  }

  const nameGate = document.getElementById("name-gate");
  const chatScreen = document.getElementById("chat-screen");
  const nameInput = document.getElementById("name-input");
  const joinBtn = document.getElementById("join-btn");
  const nameError = document.getElementById("name-error");
  const headerSub = document.getElementById("header-sub");
  const leaveBtn = document.getElementById("leave-btn");
  const messagesEl = document.getElementById("messages");
  const emptyState = document.getElementById("empty-state");
  const msgInput = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const connectionBanner = document.getElementById("connection-banner");

  // restore saved name, if any
  const savedName = localStorage.getItem("chat_name");
  if (savedName) nameInput.value = savedName;

  let unsubscribe = null;

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function formatTime(ts) {
    if (!ts) return "";
    const date = new Date(ts);
    return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  }

  function renderMessages(snapshot) {
    const data = snapshot.val();
    if (!data) {
      messagesEl.innerHTML = "";
      messagesEl.appendChild(emptyState);
      return;
    }

    // Realtime DB gives back an object keyed by push-id.
    // Convert to an array and sort by timestamp so order is reliable.
    const entries = Object.entries(data).sort((a, b) => {
      const tA = a[1].createdAt || 0;
      const tB = b[1].createdAt || 0;
      return tA - tB;
    });

    messagesEl.innerHTML = "";
    entries.forEach(([key, msg]) => {
      const isMe = msg.clientId === myClientId;

      const row = document.createElement("div");
      row.className = "msg-row " + (isMe ? "me" : "other");

      const nameLabel = document.createElement("div");
      nameLabel.className = "msg-name";
      nameLabel.textContent = isMe ? "You" : (msg.name || "Anonymous");

      const bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      bubble.textContent = msg.text || "";

      const time = document.createElement("div");
      time.className = "msg-time";
      time.textContent = formatTime(msg.createdAt);

      row.appendChild(nameLabel);
      row.appendChild(bubble);
      row.appendChild(time);
      messagesEl.appendChild(row);
    });

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function startListening() {
    const messagesQuery = query(chatRef, orderByChild("createdAt"), limitToLast(200));
    onValue(
      messagesQuery,
      (snapshot) => {
        connectionBanner.style.display = "none";
        renderMessages(snapshot);
      },
      (error) => {
        console.error("Realtime DB error:", error);
        connectionBanner.style.display = "block";
        connectionBanner.textContent = "Connection issue — check your Firebase setup";
      }
    );
    unsubscribe = () => off(messagesQuery);
  }

  async function sendMessage(text) {
    const trimmed = text.trim();
    if (!trimmed) return;

    sendBtn.disabled = true;
    try {
      await push(chatRef, {
        name: myName,
        text: trimmed,
        clientId: myClientId,
        createdAt: serverTimestamp()
      });
      msgInput.value = "";
    } catch (err) {
      console.error("Send failed:", err);
      alert("Message failed to send. Check the console / your Firebase setup.");
    } finally {
      sendBtn.disabled = false;
      msgInput.focus();
    }
  }

  function joinChat() {
    const name = nameInput.value.trim();
    if (!name) {
      nameError.textContent = "Please enter a name.";
      return;
    }
    if (name.length > 24) {
      nameError.textContent = "Name is too long (max 24 characters).";
      return;
    }
    nameError.textContent = "";
    myName = name;
    localStorage.setItem("chat_name", name);

    headerSub.textContent = "Chatting as " + myName;
    nameGate.style.display = "none";
    chatScreen.style.display = "flex";

    startListening();
    msgInput.focus();
  }

  function leaveChat() {
    if (unsubscribe) {
      unsubscribe();
      unsubscribe = null;
    }
    chatScreen.style.display = "none";
    nameGate.style.display = "flex";
    nameInput.focus();
  }

  // ============================================================
  // Event listeners
  // ============================================================
  joinBtn.addEventListener("click", joinChat);
  nameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") joinChat();
  });

  leaveBtn.addEventListener("click", leaveChat);

  sendBtn.addEventListener("click", () => sendMessage(msgInput.value));
  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage(msgInput.value);
  });

  window.addEventListener("beforeunload", () => {
    if (unsubscribe) unsubscribe();
  });
</script>

</body>
</html>
